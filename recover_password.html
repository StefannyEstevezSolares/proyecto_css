<!DOCTYPE html>
<html lang = "en">
<head>
  <meta charset = "UTF-8">
  <meta name="viewport" content= "width=device-width, initial-scale=1.0">
  <title>Recover Password</title>
    <link rel="stylesheet" href="./formating/layout.css">
    <link rel="stylesheet" href="./formating/forms.css">
    <link rel="stylesheet" href="./formating/responsive.css">
    <link rel="stylesheet" href="./formating/styles.css"></head>

<body>

<section class = "loading__transition">
        <div class = "loading__background">
            <div class = "loading__content">
                <div class = "loading__image">
                    <img 
                        src = "./images/pokeball.svg" 
                        alt = "pokeball">
                </div>
                <div class = "loading__bar">
                    <div class = "loading__progress">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <main class = "main__content">
        <header class = "header">
            <div class = "header__content">
                <div class = "logo__container">
                    <img 
                        src="./images/articuno.png" 
                        alt="logo">
                </div>
                <div class = "company__info">
                    <h1 class = "company__name">
                        Poke FLIGHTS
                    </h1>
                    <h3 class = "company__slogan">
                        Flying to your dreams
                    </h3>
                </div>
            </div>
        </header>

        <div class = "main__body">
            <section class = "recover">
                <h1 class = "recover__title">
                    Recover Password
                </h1>
                <form 
                    class = "form"
                    autocomplete = "off">
                    <input 
                        required 
                        type = "email" 
                        name = "email" 
                        placeholder = "E-mail" 
                        class = "form__input">
                    <p class = "recover__text">
                        Si el e-mail se encuentra registrado se enviará 
                        un link para continuar con la recuperacion de su contraseña.
                    </p>
                
                <a href="./create_password.html" class="button">SEND</a>
                </form>
            </section>   
        </div>

    </main>
</body>
</html>
