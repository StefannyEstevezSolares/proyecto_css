<!DOCTYPE html>
<html lang = "en">
<head>
    <meta charset = "UTF-8">
    <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
<link rel="stylesheet" href="./formating/layout.css">
    <link rel="stylesheet" href="./formating/forms.css">
    <link rel="stylesheet" href="./formating/responsive.css">
    <link rel="stylesheet" href="./formating/styles.css">
</head>

<body>
<section class = "loading__transition">
        <div class = "loading__background">
            <div class = "loading__content">
                <div class = "loading__image">
                    <img 
                        src = "./images/pokeball.svg" 
                        alt = "pokeball">
                </div>
                <div class = "loading__bar">
                    <div class = "loading__progress">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <main class = "main__content">
        <header class = "header">
            <div class = "header__content">
                <div class = "logo__container">
                    <img 
                        src = "./images/articuno.png" 
                        alt = "logo">
                </div>
                <div class = "company__info">
                    <h1 class = "company__name">
                        Poke FLIGHTS
                    </h1>
                    <h3 class = "company__slogan">
                        Flying to your dreams
                    </h3>
                </div>
            </div>
        </header>

        <div class = "main__body">
            <section class = "dashboard">
                <div class = "dashboard__info">
                    <h1 class = "dashboard__title">
                        Hello Stefanny!
                    </h1>
                    <h2 class = "dashboard__subtitle">
                        What would you like to do?
                    </h2>
                    <a 
                        href = "./index.html"
                        class = "logout__link">
                        Log out
                    </a>

                </div>
                <section class = "dashboard__options">

                    <a 
                        href = "available_flights.html"
                        class = "dashboard__card">

                        <div class = "dashboard__left">

                            <div class = "dashboard__image">
                                <img 
                                    src = "./images/zapdos.png" 
                                    alt = "search flights">
                            </div>
                            <p class = "dashboard__text">
                                Search Flights
                            </p>

                        </div>

                        <div class = "dashboard__arrow">
                            ›
                        </div>

                    </a>

                    <a 
                        href = "checkin.html"
                        class = "dashboard__card">

                        <div class = "dashboard__left">

                            <div class = "dashboard__image">
                                <img 
                                    src = "./images/zapdos.png" 
                                    alt = "check in">
                            </div>

                            <p class = "dashboard__text">
                                Check In
                            </p>

                        </div>

                        <div class = "dashboard__arrow">
                            ›
                        </div>
                    </a>

                    <a 
                        href = "my_flights.html"
                        class = "dashboard__card">
                        <div class = "dashboard__left">
                            <div class = "dashboard__image">
                                <img 
                                    src = "./images/zapdos.png" 
                                    alt = "my flights">
                            </div>
                            <p class = "dashboard__text">
                                My Flights
                            </p>
                        </div>
                        <div class = "dashboard__arrow">
                            ›
                        </div>
                    </a>

                </section>
            </section>
        </div>
    </main>

</body>
</html>
