<!DOCTYPE html>
<html lang = "en">
<head>
  <meta charset = "UTF-8">
  <meta name="viewport" content= "width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
    <link rel="stylesheet" href="./formating/layout.css">
    <link rel="stylesheet" href="./formating/forms.css">
    <link rel="stylesheet" href="./formating/responsive.css">
    <link rel="stylesheet" href="./formating/styles.css">
</head>

<body>

<section class = "loading__transition">
        <div class = "loading__background">
            <div class = "loading__content">
                <div class = "loading__image">
                    <img 
                        src = "./images/pokeball.svg" 
                        alt = "pokeball">
                </div>
                <div class = "loading__bar">
                    <div class = "loading__progress">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <main class = "main__content">
        <header class = "header">
            <div class = "header__content">
                <div class = "logo__container">
                    <img 
                        src="./images/articuno.png" 
                        alt="logo">
                </div>
                <div class = "company__info">
                    <h1 class = "company__name">
                        Poke FLIGHTS
                    </h1>
                    <h3 class = "company__slogan">
                        Flying to your dreams
                    </h3>
                </div>
            </div>
        </header>

        <div class = "main__body">
            <section class = "signup">
                <h1 class = "signup__title">
                    SIGN UP
                </h1>
                <form 
                    class = "form"
                    autocomplete = "off">

                    <input 
                        required 
                        type = "text" 
                        name = "full_name" 
                        placeholder = "Enter your full name" 
                        class = "form__input">

                    <input 
                        required 
                        type = "text" 
                        name = "id" 
                        placeholder = "ID number" 
                        class = "form__input">

                    <input 
                        required 
                        type = "email" 
                        name = "email" 
                        placeholder = "E-mail" 
                        class = "form__input">

                    <input 
                        required 
                        type = "tel" 
                        name = "telephone" 
                        placeholder = "Cellphone" 
                        class = "form__input">

                    <select 
                        id = "country" 
                        name = "country" 
                        required 
                        class = "form__input">

                        <option 
                            value = "" 
                            disabled 
                            selected>
                            Choose your city
                        </option>

                        <option>
                            Guatemala
                        </option>

                        <option>
                            Bogotá
                        </option>
                    </select>

                <a href="./create_password.html" class="button">CREATE</a>

                </form>
            </section>
        </div>
        
    </main>
</body>
</html>
