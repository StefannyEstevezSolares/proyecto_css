<!DOCTYPE html>
<html lang = "en">
<head>
  <meta charset = "UTF-8">
  <meta name="viewport" content= "width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="stylesheet" href="./index/styles.css">
</head>

<body>
    <main class = "main__content">
        <header class = "header">
            <div class = "header__content">
                <div class = "logo__container">
                    <img 
                        src="/" 
                        alt="logo">
                </div>
                <div class = "company__info">
                    <h1 class = "company__name">
                        Poke FLIGHTS
                    </h1>
                    <h3 class = "company__slogan">
                        Flying to your dreams
                    </h3>
                </div>
            </div>
        </header>

        <div class = "main__body">
            <section class = "signup">
                <h1 class = "signup__title">
                    SIGN UP
                </h1>
                <form 
                    class = "form"
                    autocomplete = "off">

                    <input 
                        required 
                        type = "text" 
                        name = "full_name" 
                        placeholder = "Enter your full name" 
                        class = "form__input">

                    <input 
                        required 
                        type = "text" 
                        name = "id" 
                        placeholder = "ID number" 
                        class = "form__input">

                    <input 
                        required 
                        type = "email" 
                        name = "email" 
                        placeholder = "E-mail" 
                        class = "form__input">

                    <input 
                        required 
                        type = "tel" 
                        name = "telephone" 
                        placeholder = "Cellphone" 
                        class = "form__input">

                    <select 
                        id = "country" 
                        name = "country" 
                        required 
                        class = "form__input">

                        <option 
                            value = "" 
                            disabled 
                            selected>
                            Choose your city
                        </option>

                        <option>
                            Guatemala
                        </option>

                        <option>
                            Bogotá
                        </option>
                    </select>

                    <button 
                        type = "submit" 
                        class = "button">
                        Submit
                    </button>
                </form>
            </section>
        </div>
        
    </main>
</body>
</html>
