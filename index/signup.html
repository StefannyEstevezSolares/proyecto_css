<!DOCTYPE html>
<html lang = "en">
<head>
  <meta charset = "UTF-8">
  <meta name="viewport" content= "width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="stylesheet" href="./index/styles.css">
</head>
<body class="body">
    <main class="main">

<div class="container">
    <div class="card__image">
        <img src="/">
    </div>
    <div>   
        <h1 class = "company__name">Poke FLIGHTS</h1>
    </div>
    <div>
        <h3 class = "company__slogan"> Flying to your dreams</h3>
    </div>
</div>

    <section class="form__section">
        <h1 class="signup__title">SIGN UP</h1>   
        <br class="space__between">
        <form class="form__list" autocomplete="off">
            <input required type="text" name="Full Name" placeholder="Enter your full name" class="full__name">
            <br>
            <input required type="text" name="Id" placeholder="ID number" class="i__d">
            <br>
            <input required type="email" name="email" placeholder="E-mail" class="e__mail">
            <br>
            <input required type="cel" name="telephone" placeholder="Cellphone" class="cell__phone">
            <br>
            <select id="country" name="country" required class="select__country">

                <option class="empty__space" value="" disabled selected>Choose your city</option>
                <option class="Guatemala">Guatemala</option>
                <option class="Bogota">Bogotá</option>
            
            </select>
            <br>
                <input type="submit" class="button" value="Submit">
        </form>


    </section>
    </main>
</body>
</html>
