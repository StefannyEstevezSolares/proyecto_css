<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poke Flights</title>
   
    <link rel="stylesheet" href="./formating/layout.css">
    <link rel="stylesheet" href="./formating/forms.css">
    <link rel="stylesheet" href="./formating/responsive.css">
    <link rel="stylesheet" href="./formating/styles.css">



</head>

<body>

    <main class="main__content">
        <header class="header">
            <div class="header__content">

                <div class="logo__container">
                    <img 
                        src="./images/articuno.png" 
                        alt="logo">
                </div>
                <div class="company__info">
                    <h1 class="company__name">
                        POKE FLIGHTS
                    </h1>

                    <p class="company__slogan">
                        Flying to your dreams
                    </p>
                </div>
            </div>
        </header>


        <div class="main__body">
            <section class="profile">
                <div class="profile__image">
                    <img 
                        src="./images/trainer.svg" 
                        alt="user">
                </div>
                <div class="profile__info">
                    <h2 class="user__name">
                        Stefanny Estevez
                    </h2>
                    <a 
                        href="signup.html"
                        class="logout__link">
                        Log out
                    </a>
                </div>

            </section>
            <hr class="divider">
            <section class="search">
                <h1 class="search__title">
                    Flight Search
                </h1>
                <form 
                    class="form"
                    autocomplete="off">
                    <div class="checkbox__container">
                        <input 
                            type="checkbox"
                            id="oneway">
                        <label for="oneway">
                            One-way
                        </label>
                    </div>

                    <input
                        type="text"
                        placeholder="Origin"
                        class="form__input"
                        required>

                    <input
                        type="text"
                        placeholder="Destination"
                        class="form__input"
                        required>

                    <input
                        type="date"
                        class="form__input"
                        required>

                    <input
                        type="date"
                        class="form__input"
                        required>

                    <button 
                        type="submit"
                        class="button">
                        SEARCH
                    </button>
                </form>
            </section>
        </div>
    </main>

</body>
</html>
