<!DOCTYPE html>
<html lang = "en">
<head>
  <meta charset = "UTF-8">
  <meta name="viewport" content= "width=device-width, initial-scale=1.0">
  <title>Home Page</title>
  <link rel="stylesheet" href="./index/styles.css">
</head>
<body class = "body">
    <main class="main__content">
    <header class = "header">
        <div class="container">
            <div class="card__image">
                <img src="/">
            </div>
            <div>    
                <h1 class = "company__name">Poke FLIGHTS</h1>
            </div>
            <div>
                <h3 class = "company__slogan"> Flying to your dreams</h3>
            </div>
        </div>
    </header>

    <section>
        <div class="container__2">
            <div class="logincard__image">
                <img src="/">
            </div>
            <div>    
                <h3 class = "user__name">Stefanny Estevez</h3>
            </div>
            <div>
                <h4 class = "log__out"><a href="signup.html" class="logout__link">Log out</a></h4>
            </div>
        </div>
    </section>


    <section>
        <h1 class="login__title">Flight Search</h1>
        <div class = "form__body">
            <form autocomplete = "off" class = "form">
                <input type="checkbox" name="oneway" value="oneway" class="check__oneway><p class = "check__oneway">One-way</p>
                <br>
                <input type = "text" name = "origin" placeholder= "Origin" required class="form__input">
                <br>
                <input type="text" name= "destiny" placeholder="Destiny" required class="form__input">
                <br>
                <input type="text" placeholder="Departure date" class="form__input">
                <br>
                <input type="text" placeholder="Return date" class="form__input">
                <br>
                <input type="submit" value="Search" class="botton">
            </form>
        </div>
    </section>
    </main>
</body>
</html>
