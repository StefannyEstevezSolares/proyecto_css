<!DOCTYPE html>
<html lang = "en">
<head>
  <meta charset = "UTF-8">
  <meta name="viewport" content= "width=device-width, initial-scale=1.0">
  <title>Create Password</title>
    <link rel="stylesheet" href="./formating/layout.css">
    <link rel="stylesheet" href="./formating/forms.css">
    <link rel="stylesheet" href="./formating/responsive.css">
    <link rel="stylesheet" href="./formating/styles.css"></head>

<body>
    <main class = "main__content">
        <header class = "header">
            <div class = "header__content">
                <div class = "logo__container">
                    <img 
                        src="./images/pokeball.svg" 
                        alt="logo">
                </div>
                <div class = "company__info">
                    <h1 class = "company__name">
                        Poke FLIGHTS
                    </h1>
                    <h3 class = "company__slogan">
                        Flying to your dreams
                    </h3>
                </div>
            </div>
        </header>

        <div class = "main__body">
            <section class = "signup">
                <h1 class = "signup__title">
                    REGISTER
                </h1>
                <form 
                    class = "form"
                    autocomplete = "off">
                    <input 
                        required 
                        type = "password" 
                        name = "password" 
                        placeholder = "Password" 
                        class = "form__input">
                    <input 
                        required 
                        type = "password" 
                        name = "repeat_password" 
                        placeholder = "Repeat Password" 
                        class = "form__input">
                    <button 
                        type = "submit" 
                        class = "button">
                        Save
                    </button>
                </form>
            </section>
        </div>


    </main>
</body>
</html>
