<!DOCTYPE html>
<html lang = "en">
<head>
  <meta charset = "UTF-8">
  <meta name="viewport" content= "width=device-width, initial-scale=1.0">
  <title>Create Password</title>
  <link rel="stylesheet" href="./index/styles.css">
</head>
<body class="body">
    <main class="main">

        <h1 class="main__title">ACME</h1>
        <h4 class="main__slogan">Flying to your dreams</h4>

        <div class="card__image">
            <img src="/.index/htm.png" alt="">
        </div>

    <section class="form__section">
        <h1 class="signup__title">Registro</h1>   
        <br class="space__between">
        <form class="form__list" autocomplete="off">
            <input required type="password" name="password" placeholder="Password" class="password">
            <br>
            <input required type="password" name="repeat_password" placeholder="Repeat Password" class="i__d">
            <br>
                <input type="submit" class="button" value="Save">
        </form>


    </section>
    </main>
</body>
</html>
