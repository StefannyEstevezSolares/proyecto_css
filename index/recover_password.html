<!DOCTYPE html>
<html lang = "en">
<head>
  <meta charset = "UTF-8">
  <meta name="viewport" content= "width=device-width, initial-scale=1.0">
  <title>Create Password</title>
  <link rel="stylesheet" href="./index/styles.css">
</head>
<body class="body">
    <main class="main">

        <h1 class="main__title">ACME</h1>
        <h4 class="main__slogan">Flying to your dreams</h4>

        <div class="card__image">
            <img src="/.index/htm.png" alt="">
        </div>

    <section class="form__section">
        <h1 class="signup__title">Recover Password</h1>   
        <br class="space__between">
        <form class="form__list" autocomplete="off">
            <input required type="email" name="password" placeholder="E-mail" class="form__email">
            <br>

            <p class="letras">Si el e-mail se encuentra registrado se enviará 
            un link para continuar con la recuperacion de su contraseña.</p>

            <br>
                <input type="submit" class="button" value="Send">
        </form>
    

    </section>
    </main>
</body>
</html>
